name: version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (format: vX.X.X)"
        required: true

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MACHINE_GH_TOKEN }}

      - name: Validate Version Format
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          if ! echo "$NEW_VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: '$NEW_VERSION' — expected vX.Y.Z"
            exit 1
          fi

      - name: Update Version
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          sed -i "s/Version string = \".*\"/Version string = \"$NEW_VERSION\"/g" main.go
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${NEW_VERSION#v}] - $(date +%Y-%m-%d)/" CHANGELOG.md

      - name: Commit & Tag
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add main.go CHANGELOG.md
          git commit -m "$NEW_VERSION"
          git tag "$NEW_VERSION"
          git push origin master --tags
